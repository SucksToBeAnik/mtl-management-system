<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Chat Viewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #111;
            color: #e4e4e7;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #27272a;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .header .meta {
            font-size: 13px;
            color: #a1a1aa;
        }
        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .stat {
            background: #1a1a2e;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #27272a;
            font-size: 13px;
        }
        .stat strong { display: block; font-size: 22px; }
        .stat span { color: #a1a1aa; font-size: 11px; }
        .chat { display: flex; flex-direction: column; gap: 12px; }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message.user { align-self: flex-end; }
        .message.assistant { align-self: flex-start; }
        .bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-wrap: break-word;
        }
        .message.user .bubble {
            background: #3b82f6;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .bubble {
            background: #1e1e2e;
            color: #e4e4e7;
            border: 1px solid #27272a;
            border-bottom-left-radius: 4px;
        }
        .msg-info {
            font-size: 11px;
            color: #71717a;
            margin: 4px 8px;
            display: flex;
            gap: 8px;
        }
        .message.assistant .msg-info { justify-content: flex-start; }
        .message.user .msg-info { justify-content: flex-end; }
        .tool-call {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 8px;
            margin-top: 6px;
            font-size: 13px;
        }
        .tool-call summary {
            padding: 8px 12px;
            cursor: pointer;
            color: #a1a1aa;
            font-size: 12px;
        }
        .tool-call pre {
            padding: 8px 12px;
            font-size: 12px;
            overflow-x: auto;
            color: #d4d4d8;
            border-top: 1px solid #27272a;
            background: #09090b;
            border-radius: 0 0 8px 8px;
        }
        .reasoning-toggle {
            cursor: pointer;
            color: #a1a1aa;
            font-size: 12px;
            padding: 4px 0;
            user-select: none;
        }
        .reasoning-toggle:hover { color: #e4e4e7; }
        .reasoning-text {
            display: none;
            padding: 8px 12px;
            margin-top: 4px;
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 6px;
            font-size: 12px;
            color: #a1a1aa;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .reasoning-text.open { display: block; }
        .empty { text-align: center; padding: 40px; color: #71717a; }
        .load-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 24px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .load-btn:hover { background: #2563eb; }
        input[type="file"] { display: none; }
        .hidden-data { display: none; }
        @media (max-width: 640px) {
            .message { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Session Chat Viewer</h1>
            <div class="meta">AI-assisted conversation log for this project</div>
        </div>
        <div class="status" id="status"></div>
        <div id="chat" class="chat">
            <div class="empty" style="padding:60px 40px;">
                <p style="margin-bottom:20px; color:#a1a1aa;">Select the exported session JSON file to view the conversation.</p>
                <button class="load-btn" onclick="document.getElementById('fileInput').click()">Choose session-export.json</button>
                <input type="file" id="fileInput" accept=".json">
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('change', function(e) {
            if (e.target.id !== 'fileInput') return;
            var file = e.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    var data = JSON.parse(ev.target.result);
                    renderChat(data);
                } catch (err) {
                    document.getElementById('chat').innerHTML = '<div class="empty">Error parsing JSON: ' + err.message + '</div>';
                }
            };
            reader.readAsText(file);
        });

        function fmtTime(ts) {
            var d = new Date(ts);
            return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) + ' ' +
                   d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function renderChat(data) {
            var messages = data.messages || [];
            var info = data.info || {};
            var chatEl = document.getElementById('chat');
            var statusEl = document.getElementById('status');

            if (messages.length === 0) {
                chatEl.innerHTML = '<div class="empty">No messages in this session.</div>';
                statusEl.textContent = '0 messages';
                return;
            }

            var userCount = messages.filter(function(m) { return m.info && m.info.role === 'user'; }).length;
            var asstCount = messages.filter(function(m) { return m.info && m.info.role === 'assistant'; }).length;
            var model = info.model || {};
            var modelName = (model.modelID || 'unknown');

            statusEl.innerHTML =
                '<div class="stats">' +
                    '<div class="stat"><strong>' + messages.length + '</strong><span>total messages</span></div>' +
                    '<div class="stat"><strong>' + userCount + '</strong><span>user</span></div>' +
                    '<div class="stat"><strong>' + asstCount + '</strong><span>assistant</span></div>' +
                    '<div class="stat"><strong style="font-size:14px;">' + escapeHtml(modelName) + '</strong><span>model</span></div>' +
                '</div>';

            var html = '';
            for (var i = 0; i < messages.length; i++) {
                var msg = messages[i];
                if (!msg.info) continue;
                var role = msg.info.role || 'unknown';
                var time = msg.info.time ? msg.info.time.created : null;
                var agent = msg.info.agent || '';
                var parts = msg.parts || [];

                var textParts = [];
                var reasoningParts = [];
                var toolParts = [];

                for (var j = 0; j < parts.length; j++) {
                    var p = parts[j];
                    if (p.type === 'text' && p.text) textParts.push(p.text);
                    else if (p.type === 'reasoning' && p.text) reasoningParts.push(p.text);
                    else if (p.type === 'tool') toolParts.push(JSON.stringify(p, null, 2).slice(0, 2000));
                }

                var fullText = textParts.join('\n\n');
                var timeStr = time ? fmtTime(time) : '';
                var agentLabel = agent ? ' via ' + agent : '';
                var msgId = msg.info.id || 'msg-' + i;

                if (role === 'user') {
                    html +=
                        '<div class="message user">' +
                            '<div class="bubble">' + (fullText ? escapeHtml(fullText) : '<em style="color:#a1a1aa">(upload or empty)</em>') + '</div>' +
                            '<div class="msg-info">' + timeStr + agentLabel + '</div>' +
                        '</div>';
                } else if (role === 'assistant') {
                    var body = '';

                    if (fullText) {
                        body += '<div class="bubble">' + escapeHtml(fullText) + '</div>';
                    }

                    for (var r = 0; r < reasoningParts.length; r++) {
                        var rid = msgId + '-r-' + r;
                        body +=
                            '<div class="reasoning-toggle" onclick="document.getElementById(\'' + rid + '\').classList.toggle(\'open\')">&#128300; Show reasoning (' + reasoningParts[r].length + ' chars)</div>' +
                            '<div class="reasoning-text" id="' + rid + '">' + escapeHtml(reasoningParts[r]) + '</div>';
                    }

                    for (var t = 0; t < toolParts.length; t++) {
                        var tid = msgId + '-t-' + t;
                        body +=
                            '<details class="tool-call">' +
                                '<summary>&#128295; Tool call' + (toolParts.length > 1 ? ' #' + (t+1) : '') + '</summary>' +
                                '<pre>' + escapeHtml(toolParts[t]) + '</pre>' +
                            '</details>';
                    }

                    if (!body) {
                        body = '<div class="bubble"><em style="color:#a1a1aa">(no text response)</em></div>';
                    }

                    html +=
                        '<div class="message assistant">' +
                            body +
                            '<div class="msg-info">' + timeStr + agentLabel + '</div>' +
                        '</div>';
                }
            }

            chatEl.innerHTML = html;
            setTimeout(function() { chatEl.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 100);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
